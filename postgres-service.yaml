apiVersion: v1
kind: Service
metadata:
  name: db
  labels:
    name: postgres-service
    app: demo-voting-app
spec:
  ports:
    - port: 5432 #port on which the service will be exposed
      targetPort: 5432 #port on which the postgres pod is listening
  selector:
    name: postgres-pod #this is the label of the postgres pod that we want to target with this service
    app: demo-voting-app #this stays same as we need this to be in the same cluster as all the other pods of the application